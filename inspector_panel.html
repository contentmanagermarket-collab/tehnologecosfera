<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Смены на проверке</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f4f6f2;
      color: #2e2e2e;
      padding: 24px;
    }

    .shell {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      width: 170px;
      max-width: 46vw;
      height: auto;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      color: #2e2e2e;
    }

    .meta {
      margin-top: 6px;
      font-size: 15px;
      color: #6a6a6a;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      padding: 13px 16px;
      border: none;
      border-radius: 16px;
      background: #96c22c;
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #6a6a6a;
    }

    button:hover {
      background: #86ad25;
    }

    button.secondary:hover {
      background: #555555;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .summary-item,
    .shift-card,
    .empty,
    .message {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.06);
    }

    .summary-item {
      padding: 18px;
    }

    .summary-value {
      font-size: 30px;
      font-weight: 700;
      color: #2e2e2e;
    }

    .summary-label {
      margin-top: 4px;
      font-size: 14px;
      color: #6a6a6a;
    }

    .message {
      display: none;
      padding: 16px 18px;
      margin-bottom: 16px;
      color: #9d321f;
      background: #fff3f0;
    }

    .empty {
      display: none;
      padding: 32px;
      text-align: center;
      color: #6a6a6a;
      font-size: 17px;
    }

    .shift-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .shift-card {
      padding: 20px;
      border: 1px solid #edf1e8;
    }

    .shift-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .employee {
      font-size: 19px;
      font-weight: 700;
      color: #2e2e2e;
    }

    .branch {
      margin-top: 5px;
      font-size: 14px;
      color: #6a6a6a;
    }

    .status {
      flex: 0 0 auto;
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      color: #ffffff;
      background: #96c22c;
    }

    .status.close {
      background: #607d8b;
    }

    .status.close_delay {
      background: #c17424;
    }

    .details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .detail {
      padding: 12px;
      border-radius: 14px;
      background: #f8faf4;
    }

    .detail-label {
      font-size: 12px;
      color: #7a7a7a;
      margin-bottom: 5px;
    }

    .detail-value {
      font-size: 15px;
      color: #2e2e2e;
      word-break: break-word;
    }

    .comment {
      padding: 13px 14px;
      border-radius: 14px;
      background: #fbfff3;
      border: 1px solid #e6ecd9;
      margin-bottom: 14px;
      font-size: 15px;
      line-height: 1.35;
      white-space: pre-wrap;
    }

    .photos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .photo {
      display: block;
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid #e6ecd9;
      background: #f8faf4;
      min-height: 160px;
    }

    .photo img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    .photo-label {
      padding: 9px 10px;
      font-size: 13px;
      color: #6a6a6a;
      background: #ffffff;
    }

    @media (max-width: 860px) {
      body { padding: 14px; }
      .topbar { display: block; }
      .actions { justify-content: flex-start; margin-top: 16px; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .shift-list { grid-template-columns: 1fr; }
    }

    @media (max-width: 520px) {
      .brand { display: block; }
      .logo { margin-bottom: 16px; }
      h1 { font-size: 23px; }
      .summary { grid-template-columns: 1fr; }
      .details { grid-template-columns: 1fr; }
      .photos { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <main class="shell">
    <div class="topbar">
      <div class="brand">
        <img class="logo" src="logo.png" alt="Экосфера" />
        <div>
          <h1>СМЕНЫ НА ПРОВЕРКЕ</h1>
          <div class="meta" id="inspectorMeta">Загрузка...</div>
        </div>
      </div>

      <div class="actions">
        <button id="refreshButton" type="button">Обновить</button>
        <button class="secondary" id="logoutButton" type="button">Выйти</button>
      </div>
    </div>

    <section class="summary">
      <div class="summary-item">
        <div class="summary-value" id="totalCount">0</div>
        <div class="summary-label">Всего</div>
      </div>
      <div class="summary-item">
        <div class="summary-value" id="openCount">0</div>
        <div class="summary-label">Открытия</div>
      </div>
      <div class="summary-item">
        <div class="summary-value" id="closeCount">0</div>
        <div class="summary-label">Закрытия</div>
      </div>
      <div class="summary-item">
        <div class="summary-value" id="delayCount">0</div>
        <div class="summary-label">Следующий день</div>
      </div>
    </section>

    <div class="message" id="message"></div>
    <div class="empty" id="empty">Смен на проверке сейчас нет.</div>
    <section class="shift-list" id="shiftList"></section>
  </main>

  <script>
    const BACKEND_URL = 'https://ekosfera.midera.fun/web';

    const params = new URLSearchParams(window.location.search);
    const tokenFromUrl = params.get('token') || '';
    const savedToken = localStorage.getItem('inspector_token') || '';
    const token = tokenFromUrl || savedToken;

    const inspectorMeta = document.getElementById('inspectorMeta');
    const shiftList = document.getElementById('shiftList');
    const message = document.getElementById('message');
    const empty = document.getElementById('empty');
    const refreshButton = document.getElementById('refreshButton');
    const logoutButton = document.getElementById('logoutButton');

    const totalCount = document.getElementById('totalCount');
    const openCount = document.getElementById('openCount');
    const closeCount = document.getElementById('closeCount');
    const delayCount = document.getElementById('delayCount');

    function showMessage(text) {
      message.textContent = text;
      message.style.display = 'block';
    }

    function clearMessage() {
      message.textContent = '';
      message.style.display = 'none';
    }

    function statusText(status) {
      if (status === 'open') return 'Открытие';
      if (status === 'close') return 'Закрытие';
      if (status === 'close_delay') return 'Следующий день';
      return status || 'Статус';
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function photoBlock(label, url) {
      if (!url) {
        return `
          <div class="photo">
            <div class="photo-label">${label}: фото нет</div>
          </div>
        `;
      }

      return `
        <a class="photo" href="${escapeHtml(url)}" target="_blank" rel="noopener">
          <img src="${escapeHtml(url)}" alt="${label}" />
          <div class="photo-label">${label}</div>
        </a>
      `;
    }

    function renderShifts(shifts) {
      const openItems = shifts.filter(item => item.status === 'open');
      const closeItems = shifts.filter(item => item.status === 'close');
      const delayItems = shifts.filter(item => item.status === 'close_delay');

      totalCount.textContent = shifts.length;
      openCount.textContent = openItems.length;
      closeCount.textContent = closeItems.length;
      delayCount.textContent = delayItems.length;

      shiftList.innerHTML = '';
      empty.style.display = shifts.length ? 'none' : 'block';

      shifts.forEach(shift => {
        const card = document.createElement('article');
        card.className = 'shift-card';

        card.innerHTML = `
          <div class="shift-head">
            <div>
              <div class="employee">${escapeHtml(shift.user_name)}</div>
              <div class="branch">${escapeHtml(shift.branch_name)} · ${escapeHtml(shift.branch_code)}</div>
            </div>
            <div class="status ${escapeHtml(shift.status)}">${statusText(shift.status)}</div>
          </div>

          <div class="details">
            <div class="detail">
              <div class="detail-label">Открытие</div>
              <div class="detail-value">${escapeHtml(shift.start_time || '-')}</div>
            </div>
            <div class="detail">
              <div class="detail-label">Закрытие</div>
              <div class="detail-value">${escapeHtml(shift.stop_time || '-')}</div>
            </div>
            <div class="detail">
              <div class="detail-label">Создано</div>
              <div class="detail-value">${escapeHtml(shift.created_at || '-')}</div>
            </div>
            <div class="detail">
              <div class="detail-label">ID смены</div>
              <div class="detail-value">${escapeHtml(shift._id)}</div>
            </div>
          </div>

          <div class="comment">${escapeHtml(shift.user_comments || 'Комментарий не указан')}</div>

          <div class="photos">
            ${photoBlock('Фото открытия', shift.start_image_url)}
            ${photoBlock('Фото закрытия', shift.stop_image_url)}
          </div>
        `;

        shiftList.appendChild(card);
      });
    }

    async function loadShifts() {
      if (!token) {
        window.location.href = 'inspector_login.html';
        return;
      }

      refreshButton.disabled = true;
      refreshButton.textContent = 'Загрузка...';
      clearMessage();

      try {
        const response = await fetch(`${BACKEND_URL}/inspector/shifts?token=${encodeURIComponent(token)}`);
        const result = await response.json();

        if (!result.success) {
          localStorage.removeItem('inspector_token');
          showMessage(result.message || 'Доступ запрещен.');
          inspectorMeta.textContent = 'Нет доступа';
          renderShifts([]);
          return;
        }

        localStorage.setItem('inspector_token', token);
        inspectorMeta.textContent = `${result.inspector.name || 'Проверяющий'} · филиалов: ${result.branches.length}`;
        renderShifts(result.shifts || []);
      } catch (error) {
        console.error(error);
        showMessage('Ошибка загрузки смен. Попробуйте обновить страницу.');
      } finally {
        refreshButton.disabled = false;
        refreshButton.textContent = 'Обновить';
      }
    }

    refreshButton.addEventListener('click', loadShifts);

    logoutButton.addEventListener('click', () => {
      localStorage.removeItem('inspector_token');
      window.location.href = 'inspector_login.html';
    });

    loadShifts();
  </script>
</body>
</html>
