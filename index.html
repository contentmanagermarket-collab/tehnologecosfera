<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>АССИСТЕНТ ТЕХНОЛОГА</title>
  <style>
    :root {
      --bg: #f4f6f3;
      --card: #ffffff;
      --text: #1f2a1f;
      --muted: #647067;
      --border: #d9e0d6;
      --green: #0d8800;
      --green-dark: #0b6e00;
      --user: #eaf7e7;
      --bot: #f1f4f1;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      font-family: Arial, sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 760px;
      height: 88vh;
      background: var(--card);
      border-radius: 24px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #ffffff 0%, #f8fbf7 100%);
    }

    .title { margin: 0 0 6px; font-size: 24px; }
    .subtitle { margin: 0; color: var(--muted); font-size: 14px; }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #fcfdfc;
    }

    .message {
      max-width: 82%;
      padding: 14px 16px;
      border-radius: var(--radius);
      white-space: pre-wrap;
      font-size: 15px;
    }

    .user { align-self: flex-end; background: var(--user); }
    .bot { align-self: flex-start; background: var(--bot); }

    .composer {
      border-top: 1px solid var(--border);
      padding: 16px;
      background: #fff;
    }

    .row { display: flex; gap: 12px; margin-bottom: 12px; }
    .field { flex: 1; }

    label { font-size: 13px; font-weight: 700; color: var(--muted); }

    input, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
    }

    textarea { min-height: 90px; margin-bottom: 12px; }

    .actions {
      display: flex;
      justify-content: space-between;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      background: var(--green);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled { background: #9db39a; }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1 class="title">АССИСТЕНТ ТЕХНОЛОГА</h1>
    <p class="subtitle">Составит меню под ваш запрос</p>
  </div>

  <div class="chat" id="chat">
    <div class="message bot">Введите ID и задачу</div>
  </div>

  <div class="composer">
    <div class="row">
      <div class="field">
        <label>ID</label>
        <input id="sessionId" placeholder="technolog_ivanova">
      </div>
    </div>

    <textarea id="userMessage" placeholder="Составь меню для вахтового поселка на 7 дней."></textarea>

    <div class="actions">
      <button id="sendButton" onclick="sendRequest()">Отправить</button>
    </div>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const sendButton = document.getElementById('sendButton');

function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = 'message ' + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendRequest() {
  const sessionId = document.getElementById('sessionId').value.trim();
  const userMessage = document.getElementById('userMessage').value.trim();

  if (!sessionId || !userMessage) {
    alert('Заполни поля');
    return;
  }

  addMessage(userMessage, 'user');
  document.getElementById('userMessage').value = '';

  sendButton.disabled = true;

  try {
    const response = await fetch('https://kruglovaproai.ru/webhook/bf4dd093-bb02-472c-9454-7ab9af97bd1d', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chatInput: userMessage,
        sessionId: sessionId
      })
    });

    const contentType = response.headers.get('content-type') || '';

let text;

if (contentType.includes('application/json')) {
  const data = await response.json();
  text = data.output || data.text || data.response || JSON.stringify(data, null, 2);
} else {
  text = await response.text();
}

addMessage(text || 'Ответ пустой.', 'bot');

  } catch (e) {
    addMessage('Ошибка: ' + e.message, 'bot');
  }

  sendButton.disabled = false;
}
</script>

</body>
</html>
