<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>АССИСТЕНТ ТЕХНОЛОГА</title>
  <style>
    :root {
      --bg: #f4f6f3;
      --card: #ffffff;
      --text: #1f2a1f;
      --muted: #647067;
      --border: #d9e0d6;
      --green: #0d8800;
      --green-dark: #0b6e00;
      --user: #eaf7e7;
      --bot: #f1f4f1;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      font-family: Arial, sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .app {
      width: 100%;
      max-width: 1180px;
      height: 94vh;
      background: var(--card);
      border-radius: 24px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .header {
      padding: 22px 28px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #ffffff 0%, #f8fbf7 100%);
    }

    .title {
      margin: 0 0 6px;
      font-size: 30px;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 26px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #fcfdfc;
    }

    .message {
      max-width: 82%;
      padding: 16px 18px;
      border-radius: var(--radius);
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 16px;
      font-family: Arial, sans-serif;
    }

    .message.user {
      align-self: flex-end;
      background: var(--user);
      border-bottom-right-radius: 6px;
    }

    .message.bot {
      align-self: flex-start;
      background: var(--bot);
      border-bottom-left-radius: 6px;
      overflow-x: auto;
      max-width: 95%;
    }

    .message table {
      border-collapse: collapse;
      width: 100%;
      margin: 12px 0;
      background: #fff;
      font-size: 14px;
    }

    .message th,
    .message td {
      border: 1px solid var(--border);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }

    .message th {
      background: #eef5ec;
      font-weight: 700;
    }

    .composer {
      border-top: 1px solid var(--border);
      padding: 18px 22px;
      background: #fff;
    }

    .row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .field { flex: 1; }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(13, 136, 0, 0.12);
    }

    textarea {
      min-height: 100px;
      resize: vertical;
      margin-bottom: 12px;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 24px;
      background: var(--green);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: var(--green-dark); }
    button:disabled { background: #9db39a; cursor: not-allowed; }

    @media (max-width: 760px) {
      body { padding: 0; }

      .app {
        height: 100vh;
        border-radius: 0;
        max-width: 100%;
      }

      .title { font-size: 24px; }
      .chat { padding: 16px; }

      .message {
        max-width: 95%;
        font-size: 15px;
      }

      .row { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>

<body>
<div class="app">
  <div class="header">
    <h1 class="title">АССИСТЕНТ ТЕХНОЛОГА</h1>
    <p class="subtitle">Составит меню под ваш запрос</p>
  </div>

  <div class="chat" id="chat">
    <div class="message bot">Введите ID и задачу</div>
  </div>

  <div class="composer">
    <div class="row">
      <div class="field">
        <label>ID</label>
        <input id="sessionId" placeholder="technolog_ivanova">
      </div>
    </div>

    <textarea id="userMessage" placeholder="Составь меню для вахтового поселка на 7 дней."></textarea>

    <div class="actions">
      <button id="sendButton" onclick="sendRequest()">Отправить</button>
    </div>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const sendButton = document.getElementById('sendButton');

function escapeHtml(text) {
  return text
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function markdownTablesToHtml(text) {
  const lines = text.split('\n');
  let html = '';
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    if (
      line.includes('|') &&
      i + 1 < lines.length &&
      lines[i + 1].includes('|') &&
      lines[i + 1].includes('---')
    ) {
      const headerCells = line.split('|').map(c => c.trim()).filter(Boolean);
      i += 2;

      const rows = [];

      while (i < lines.length && lines[i].includes('|')) {
        rows.push(lines[i].split('|').map(c => c.trim()).filter(Boolean));
        i++;
      }

      html += '<table><thead><tr>';
      headerCells.forEach(cell => {
        html += '<th>' + escapeHtml(cell) + '</th>';
      });
      html += '</tr></thead><tbody>';

      rows.forEach(row => {
        html += '<tr>';
        row.forEach(cell => {
          html += '<td>' + escapeHtml(cell) + '</td>';
        });
        html += '</tr>';
      });

      html += '</tbody></table>';
    } else {
      html += escapeHtml(line) + '\n';
      i++;
    }
  }

  return html;
}

function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = 'message ' + type;

  if (type === 'bot') {
    div.innerHTML = markdownTablesToHtml(text);
  } else {
    div.textContent = text;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendRequest() {
  const sessionId = document.getElementById('sessionId').value.trim();
  const userMessage = document.getElementById('userMessage').value.trim();

  if (!sessionId || !userMessage) {
    alert('Заполните ID и сообщение');
    return;
  }

  addMessage(userMessage, 'user');
  document.getElementById('userMessage').value = '';

  sendButton.disabled = true;
  sendButton.textContent = 'Отправка...';

  try {
    const response = await fetch('https://kruglovaproai.ru/webhook/bf4dd093-bb02-472c-9454-7ab9af97bd1d', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chatInput: userMessage,
        sessionId: sessionId
      })
    });

    const contentType = response.headers.get('content-type') || '';
    let text;

    if (contentType.includes('application/json')) {
      const data = await response.json();
      text = data.output || data.text || data.response || JSON.stringify(data, null, 2);
    } else {
      text = await response.text();
    }

    addMessage(text || 'Ответ пустой.', 'bot');

  } catch (e) {
    addMessage('Ошибка: ' + e.message, 'bot');
  }

  sendButton.disabled = false;
  sendButton.textContent = 'Отправить';
}

document.getElementById('userMessage').addEventListener('keydown', function(event) {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    sendRequest();
  }
});
</script>

</body>
</html>
