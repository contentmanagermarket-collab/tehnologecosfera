<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Учет рабочего времени</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f4f6f2;
      color: #2e2e2e;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
    }

    .logo {
      display: block;
      max-width: 280px;
      width: 100%;
      margin: 0 auto 28px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      text-align: center;
      color: #2e2e2e;
      letter-spacing: 0.5px;
    }

    .subtitle {
      margin: 10px 0 30px;
      text-align: center;
      font-size: 18px;
      color: #6a6a6a;
    }

    label {
      display: block;
      margin: 18px 0 8px;
      font-size: 15px;
      font-weight: 700;
      color: #2e2e2e;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #dfe5d8;
      border-radius: 16px;
      padding: 15px 16px;
      font-size: 16px;
      font-family: Arial, sans-serif;
      outline: none;
      background: #ffffff;
    }

    input:focus,
    textarea:focus {
      border-color: #96c22c;
      box-shadow: 0 0 0 4px rgba(150, 194, 44, 0.18);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .hint {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.35;
      color: #6a6a6a;
    }

    .inspector-box {
      margin-top: 18px;
      padding: 16px;
      border: 1px solid #e1e8d8;
      border-radius: 18px;
      background: #fbfff3;
    }

    .inspector-box label {
      margin-top: 0;
    }

    .upload-box {
      margin-top: 8px;
      border: 2px dashed #96c22c;
      border-radius: 20px;
      padding: 22px;
      text-align: center;
      background: #fbfff3;
    }

    .file-input {
      display: none;
    }

    .upload-button {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 999px;
      background: #96c22c;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      border: none;
    }

    .file-name {
      margin-top: 12px;
      font-size: 14px;
      color: #6a6a6a;
      word-break: break-word;
    }

    .preview {
      display: none;
      margin-top: 16px;
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 18px;
      border: 1px solid #e6ecd9;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 26px;
    }

    .submit-button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 18px;
      background: #96c22c;
      color: #ffffff;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
    }

    .submit-button.stop {
      background: #6a6a6a;
    }

    .submit-button:hover,
    .upload-button:hover {
      background: #86ad25;
    }

    .submit-button.stop:hover {
      background: #555555;
    }

    .submit-button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    @media (max-width: 520px) {
      body { padding: 14px; align-items: flex-start; }
      .card { padding: 24px 18px; border-radius: 22px; }
      h1 { font-size: 23px; }
      .subtitle { font-size: 16px; }
      .action-buttons { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <main class="card">
    <img class="logo" src="logo.png" alt="Экосфера" />

    <h1>УЧЕТ РАБОЧЕГО ВРЕМЕНИ</h1>
    <div class="subtitle">Контроль смены</div>

    <form id="shiftForm">
      <label for="employee">Сотрудник</label>
      <input id="employee" name="employee" type="text" placeholder="Введите ФИО" required />

      <label for="comment">Комментарий</label>
      <textarea id="comment" name="comment" placeholder="Введите комментарий"></textarea>

      <div class="inspector-box">
        <label for="inspectorToken">Токен проверяющего</label>
        <input id="inspectorToken" name="inspectorToken" type="password" placeholder="Заполняет только проверяющий" />
        <div class="hint">
          Если смену открывает или закрывает проверяющий за сотрудника без фото, комментарий обязателен.
        </div>
      </div>

      <label for="photo">Фото</label>
      <div class="upload-box">
        <input
          class="file-input"
          id="photo"
          name="photo"
          type="file"
          accept="image/*"
          capture="environment"
        />
        <label class="upload-button" for="photo">Сделать фото</label>
        <div class="file-name" id="fileName">Файл не выбран</div>
        <img class="preview" id="preview" alt="Предпросмотр фото" />
      </div>

      <div class="action-buttons">
        <button class="submit-button" type="submit" data-action="start">Открыть смену</button>
        <button class="submit-button stop" type="submit" data-action="stop">Закрыть смену</button>
      </div>
    </form>
  </main>

  <script>
    const SUPABASE_URL = 'https://yhipguyfkwmszcxlpgvz.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_UOnF4Il-LMG_K-wOeYoysw_ISaQ9rjA';
    const BACKEND_URL = 'https://ekosfera.midera.fun/web/submit_shift';
    const SUPABASE_BUCKET = 'work_photos';

    const urlParams = new URLSearchParams(window.location.search);
    const branchId = urlParams.get('branch_id') || '';

    const photoInput = document.getElementById('photo');
    const fileName = document.getElementById('fileName');
    const preview = document.getElementById('preview');
    const actionButtons = document.querySelectorAll('.submit-button');

    let selectedAction = '';

    actionButtons.forEach(button => {
      button.addEventListener('click', () => {
        selectedAction = button.dataset.action;
      });
    });

    photoInput.addEventListener('change', () => {
      const file = photoInput.files[0];

      if (!file) {
        fileName.textContent = 'Файл не выбран';
        preview.style.display = 'none';
        preview.src = '';
        return;
      }

      fileName.textContent = `${file.name} (${formatBytes(file.size)})`;

      const reader = new FileReader();
      reader.onload = event => {
        preview.src = event.target.result;
        preview.style.display = 'block';
      };

      reader.readAsDataURL(file);
    });

    function setLoading(isLoading) {
      actionButtons[0].disabled = isLoading;
      actionButtons[1].disabled = isLoading;

      if (isLoading) {
        actionButtons[0].textContent = 'Загрузка...';
        actionButtons[1].textContent = 'Загрузка...';
      } else {
        actionButtons[0].textContent = 'Открыть смену';
        actionButtons[1].textContent = 'Закрыть смену';
      }
    }

    function formatBytes(bytes) {
      if (!bytes && bytes !== 0) {
        return '';
      }

      if (bytes < 1024) {
        return `${bytes} Б`;
      }

      if (bytes < 1024 * 1024) {
        return `${(bytes / 1024).toFixed(1)} КБ`;
      }

      return `${(bytes / 1024 / 1024).toFixed(1)} МБ`;
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function createId() {
      if (window.crypto && crypto.randomUUID) {
        return crypto.randomUUID();
      }

      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    async function readJsonResponse(response) {
      const text = await response.text();

      if (!text) {
        throw new Error(`Сервер вернул пустой ответ. HTTP ${response.status}`);
      }

      try {
        return JSON.parse(text);
      } catch (error) {
        throw new Error(`Сервер вернул не JSON. HTTP ${response.status}. Ответ: ${text.slice(0, 160)}`);
      }
    }

    function canvasToBlob(canvas, type, quality) {
      return new Promise((resolve, reject) => {
        canvas.toBlob(blob => {
          if (!blob) {
            reject(new Error('Не удалось сжать фото.'));
            return;
          }

          resolve(blob);
        }, type, quality);
      });
    }

    async function compressImage(file) {
      const maxSize = 900;
      const qualitySteps = [0.62, 0.55, 0.48, 0.42];
      const targetMaxBytes = 650 * 1024;

      if (!file.type || !file.type.startsWith('image/')) {
        throw new Error('Выбранный файл не похож на фото. Выберите изображение из галереи или камеры.');
      }

      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onerror = () => {
          reject(new Error('Не удалось прочитать фото на телефоне.'));
        };

        reader.onload = event => {
          const image = new Image();

          image.onerror = () => {
            reject(new Error('Не удалось подготовить фото. Если это HEIC/Live Photo, выберите обычное фото JPG.'));
          };

          image.onload = async () => {
            try {
              let width = image.width;
              let height = image.height;

              if (!width || !height) {
                reject(new Error('Фото повреждено или не читается браузером.'));
                return;
              }

              if (width > height && width > maxSize) {
                height = Math.round((height * maxSize) / width);
                width = maxSize;
              } else if (height > maxSize) {
                width = Math.round((width * maxSize) / height);
                height = maxSize;
              }

              const canvas = document.createElement('canvas');
              canvas.width = width;
              canvas.height = height;

              const context = canvas.getContext('2d');
              context.fillStyle = '#ffffff';
              context.fillRect(0, 0, width, height);
              context.drawImage(image, 0, 0, width, height);

              let finalBlob = null;

              for (const quality of qualitySteps) {
                const blob = await canvasToBlob(canvas, 'image/jpeg', quality);
                finalBlob = blob;

                if (blob.size <= targetMaxBytes) {
                  break;
                }
              }

              if (!finalBlob) {
                reject(new Error('Не удалось сжать фото.'));
                return;
              }

              const compressedFile = new File(
                [finalBlob],
                'shift_photo.jpg',
                { type: 'image/jpeg' }
              );

              resolve(compressedFile);
            } catch (error) {
              reject(error);
            }
          };

          image.src = event.target.result;
        };

        reader.readAsDataURL(file);
      });
    }

    async function fetchWithTimeout(url, options, timeoutMs) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

      try {
        return await fetch(url, {
          ...options,
          signal: controller.signal
        });
      } finally {
        clearTimeout(timeoutId);
      }
    }

    async function uploadWithTimeout(filePath, uploadFile, timeoutMs) {
      const uploadUrl = `${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/${filePath}`;

      let response;

      try {
        response = await fetchWithTimeout(uploadUrl, {
          method: 'POST',
          mode: 'cors',
          cache: 'no-store',
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'image/jpeg',
            'x-upsert': 'true',
            'Cache-Control': '3600'
          },
          body: uploadFile
        }, timeoutMs);
      } catch (error) {
        if (error.name === 'AbortError') {
          throw new Error('Превышено время ожидания загрузки фото. Проверьте интернет и попробуйте еще раз.');
        }

        throw new Error(`Сетевой сбой при загрузке фото: ${error.message}`);
      }

      const responseText = await response.text();

      if (!response.ok) {
        throw new Error(`Supabase HTTP ${response.status}: ${responseText.slice(0, 220) || 'пустой ответ'}`);
      }

      return true;
    }

    async function uploadPhotoToSupabase(uploadFile) {
      const randomId = createId();
      const filePath = `shift_photos/${randomId}.jpg`;
      let lastErrorMessage = '';

      for (let attempt = 1; attempt <= 3; attempt += 1) {
        try {
          await uploadWithTimeout(filePath, uploadFile, 35000);

          return `${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${filePath}`;
        } catch (error) {
          lastErrorMessage = error.message || String(error);

          if (attempt < 3) {
            await delay(1200 * attempt);
            continue;
          }
        }
      }

      const lowerMessage = lastErrorMessage.toLowerCase();

      if (
        lowerMessage.includes('load failed') ||
        lowerMessage.includes('failed to fetch') ||
        lowerMessage.includes('network') ||
        lowerMessage.includes('timeout') ||
        lowerMessage.includes('сетевой') ||
        lowerMessage.includes('превышено время')
      ) {
        throw new Error(
          `Supabase не принял фото после 3 попыток. Фото уже сжато до ${formatBytes(uploadFile.size)}. ` +
          `Чаще всего причина: слабый интернет, мобильный Safari или временный сбой Supabase. ` +
          `Попробуйте переключить интернет Wi-Fi/LTE и отправить еще раз. Технически: ${lastErrorMessage}`
        );
      }

      throw new Error(`Supabase не принял фото после 3 попыток. Технически: ${lastErrorMessage}`);
    }

    document.getElementById('shiftForm').addEventListener('submit', async event => {
      event.preventDefault();

      const employee = document.getElementById('employee').value.trim();
      const comment = document.getElementById('comment').value.trim();
      const inspectorToken = document.getElementById('inspectorToken').value.trim();
      const file = photoInput.files[0];

      let photoUrl = '';
      let stage = 'проверка формы';

      if (!employee) {
        alert('Введите ФИО сотрудника. Формат: Иванов Иван Петрович');
        return;
      }

      if (!selectedAction) {
        alert('Выберите действие: открыть смену или закрыть смену.');
        return;
      }

      if (!file && !inspectorToken) {
        alert('Для открытия или закрытия смены сотрудником нужно сделать фото.');
        return;
      }

      if (inspectorToken && !file && !comment) {
        alert('Если проверяющий открывает или закрывает смену без фото, комментарий обязателен.');
        return;
      }

      setLoading(true);

      try {
        if (file) {
          stage = 'подготовка фото';

          const uploadFile = await compressImage(file);

          stage = `загрузка фото в Supabase, размер после сжатия ${formatBytes(uploadFile.size)}`;

          photoUrl = await uploadPhotoToSupabase(uploadFile);
        }

        stage = 'отправка данных смены на сервер';

        const response = await fetch(BACKEND_URL, {
          method: 'POST',
          mode: 'cors',
          cache: 'no-store',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            employee,
            comment,
            photoUrl,
            action: selectedAction,
            branch_id: branchId,
            inspector_token: inspectorToken
          })
        });

        stage = 'чтение ответа сервера';

        const result = await readJsonResponse(response);

        if (!response.ok) {
          alert(result.message || `Ошибка сервера. HTTP ${response.status}`);
          return;
        }

        if (!result.success) {
          alert(result.message);
          return;
        }

        alert(result.message);

        document.getElementById('shiftForm').reset();

        fileName.textContent = 'Файл не выбран';
        preview.style.display = 'none';
        preview.src = '';
        selectedAction = '';

        setTimeout(() => {
          location.reload();
        }, 500);

      } catch (error) {
        console.error(error);
        alert(`Ошибка на этапе "${stage}": ${error.message}`);
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
